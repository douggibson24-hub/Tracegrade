    <!-- LESSON 1: Reading Grades -->
    <div class="academy-lesson active" id="lesson-grades">
      <div class="lesson-section">
        <div class="lesson-section-title">HOW TO READ YOUR SIGNAL GRADE</div>
        <div class="lesson-p">Every chart you upload receives a letter grade from A+ to F and a confidence score from 0–100%. These two numbers together tell you the quality of the setup and how much the AI trusts its own read.</div>
        <table class="grade-table">
          <tr><th>GRADE</th><th>MEANING</th><th>ACTION</th></tr>
          <tr><td><span class="gl" style="color:var(--accent2);">A+/A</span></td><td>Exceptional setup. Multiple strategies aligned. Strong confluence.</td><td style="color:var(--accent2);font-weight:700;">High priority trade</td></tr>
          <tr><td><span class="gl" style="color:var(--accent2);">A-/B+</span></td><td>Strong setup with minor weaknesses. Most factors confirmed.</td><td style="color:var(--accent2);font-weight:700;">Good trade — take it</td></tr>
          <tr><td><span class="gl" style="color:var(--accent);">B/B-</span></td><td>Decent setup. Some mixed signals. Not perfect but tradeable.</td><td style="color:var(--accent);">Trade with smaller size</td></tr>
          <tr><td><span class="gl" style="color:var(--warn);">C+/C</span></td><td>Weak setup. More signals against than for. High risk.</td><td style="color:var(--warn);">Wait for better setup</td></tr>
          <tr><td><span class="gl" style="color:var(--danger);">C-/D/F</span></td><td>Poor setup. Low confluence. Likely to fail.</td><td style="color:var(--danger);">Skip this trade</td></tr>
        </table>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title">UNDERSTANDING CONFIDENCE SCORE</div>
        <div class="lesson-p">The confidence score (0–100%) measures how certain the AI is about its grade. A high grade with low confidence means the setup looks good but the chart is unclear. Always read both together.</div>
        <div class="two-col">
          <div class="info-card">
            <div class="info-card-title">HIGH CONFIDENCE (75–100%)</div>
            <p>Clear chart, strong signals, AI is certain. Grade is reliable. Trade according to the grade.</p>
          </div>
          <div class="info-card">
            <div class="info-card-title">MEDIUM CONFIDENCE (50–74%)</div>
            <p>Some ambiguity. Grade is probably right but reduce position size by 25–50%.</p>
          </div>
          <div class="info-card">
            <div class="info-card-title">LOW CONFIDENCE (25–49%)</div>
            <p>Chart is unclear or mixed signals. Consider a higher timeframe or wait for clarity.</p>
          </div>
          <div class="info-card">
            <div class="info-card-title">VERY LOW (&lt;25%)</div>
            <p>AI cannot read the chart well. Upload a cleaner screenshot or skip the trade.</p>
          </div>
        </div>
        <div class="callout" style="margin-top:16px;"><strong>💡 Pro Tip</strong>Only take A/B grade trades with 70%+ confidence. Below that, the edge disappears.</div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title">READING THE STRATEGY BREAKDOWN</div>
        <div class="lesson-p">Each of the 5 strategies is scored independently 0–100. Look for <strong>confluence</strong> — multiple strategies agreeing. A trade where 4 out of 5 strategies are bullish is far stronger than one where only 2 agree.</div>
        <div class="lesson-rule"><div class="rule-icon">🕯️</div><div><div class="rule-title">Price Action</div><div class="rule-body">Candlestick patterns at key levels. A bullish engulfing or pin bar at support is a strong signal.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📐</div><div><div class="rule-title">Support & Resistance</div><div class="rule-body">Is price at a key level? Entries near strong S/R have better risk/reward.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📈</div><div><div class="rule-title">Moving Averages</div><div class="rule-body">Are MAs aligned with your trade direction? Price above EMA20 = bullish bias.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">⚡</div><div><div class="rule-title">RSI / MACD</div><div class="rule-body">Momentum confirmation. RSI oversold + MACD crossover = strong long signal.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🌀</div><div><div class="rule-title">Fibonacci</div><div class="rule-body">Is price at a key fib level (38.2%, 61.8%)? These are high-probability reversal zones.</div></div></div>
      </div>
    </div>

    <!-- LESSON 2: Entry & Exit -->
    <div class="academy-lesson" id="lesson-entry">
      <div class="lesson-section">
        <div class="lesson-section-title green">ENTRY STRATEGIES</div>
        <div class="lesson-p">A good entry is everything. Entering at the wrong price turns a great setup into a losing trade. Here are the three main entry methods used by professional traders.</div>
        <div class="lesson-rule">
          <div class="rule-icon">🎯</div>
          <div>
            <div class="rule-title">1. Limit Order at Key Level</div>
            <div class="rule-body">Place a limit order at the exact support, resistance, or Fibonacci level identified in your grade. You get the best price but may miss the move if price doesn't pull back.</div>
            <div class="rule-example">BUY LIMIT @ 1.2450 (support level)</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">✅</div>
          <div>
            <div class="rule-title">2. Confirmation Entry</div>
            <div class="rule-body">Wait for a confirming candle (bullish engulfing, hammer, strong close) before entering. Safer than a limit order — you give up a little price to confirm the move is real.</div>
            <div class="rule-example">Wait for H1 candle to close bullish above 1.2450, then BUY MARKET</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">📈</div>
          <div>
            <div class="rule-title">3. Breakout Entry</div>
            <div class="rule-body">Enter when price breaks and closes above a key resistance level. Best used for momentum trades. Place a buy stop above resistance so you only enter if the breakout happens.</div>
            <div class="rule-example">BUY STOP @ 1.2510 (above resistance)</div>
          </div>
        </div>
        <div class="callout green"><strong>✅ Best Practice</strong>For A/A+ grades: Limit or confirmation entry. For breakout setups: Buy/Sell stop above/below the level.</div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title green">EXIT STRATEGIES</div>
        <div class="lesson-p">Knowing when to exit is just as important as knowing when to enter. Most traders lose money not from bad entries but from poor exits — holding losers too long and cutting winners too short.</div>
        <div class="lesson-rule">
          <div class="rule-icon">🏁</div>
          <div>
            <div class="rule-title">Fixed Target (Take Profit)</div>
            <div class="rule-body">Set your take profit at the target level provided in your grade. This is usually the next major resistance (for longs) or support (for shorts). Set it and walk away.</div>
            <div class="rule-example">TP @ 1.2530 — the next resistance level</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">🪜</div>
          <div>
            <div class="rule-title">Scaled Exit (Partial Close)</div>
            <div class="rule-body">Close 50% of your position at 1R profit (your initial risk), then move your stop to breakeven and let the rest run to your full target. Locks in profit while letting winners grow.</div>
            <div class="rule-example">Close half @ 1R → Move SL to entry → Let rest run to 2R</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">🔄</div>
          <div>
            <div class="rule-title">Trailing Stop Exit</div>
            <div class="rule-body">As price moves in your favor, trail your stop behind each new swing low (for longs). You never know exactly how far a move will go — trailing lets you capture more of big moves.</div>
            <div class="rule-example">Trail SL behind each new higher low as price climbs</div>
          </div>
        </div>
        <div class="callout warn"><strong>⚠️ Exit Rule</strong>Always have your exit planned BEFORE you enter. Never exit based on emotion — only exit when price hits your TP, SL, or your setup is invalidated.</div>
      </div>
    </div>

    <!-- LESSON 3: Stop Loss & Take Profit -->
    <div class="academy-lesson" id="lesson-sltp">
      <div class="lesson-section">
        <div class="lesson-section-title warn">STOP LOSS PLACEMENT</div>
        <div class="lesson-p">Your stop loss is the price where your trade is proven wrong. Place it at a level where, if reached, the setup is no longer valid — not just where you're comfortable losing.</div>
        <div class="lesson-rule">
          <div class="rule-icon">📐</div>
          <div>
            <div class="rule-title">Below Support (Long Trades)</div>
            <div class="rule-body">Place your stop 5–10 pips below the support level you're buying. If price breaks below support, the trade is invalid. Don't place it right at support — give it room to breathe.</div>
            <div class="rule-example">Support @ 1.2450 → SL @ 1.2438 (12 pips below)</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">📐</div>
          <div>
            <div class="rule-title">Above Resistance (Short Trades)</div>
            <div class="rule-body">Place your stop 5–10 pips above the resistance level you're selling. If price pushes through resistance, sellers are no longer in control.</div>
            <div class="rule-example">Resistance @ 1.2510 → SL @ 1.2522 (12 pips above)</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">🕯️</div>
          <div>
            <div class="rule-title">Beyond the Pattern</div>
            <div class="rule-body">For candlestick patterns, place your stop beyond the wick of the signal candle. A hammer's low being taken out means the pattern failed.</div>
            <div class="rule-example">Hammer low @ 1.2445 → SL @ 1.2440</div>
          </div>
        </div>
        <div class="callout danger"><strong>🚫 Never Do This</strong>Never move your stop loss further away from price because you "don't want to get stopped out." That turns a controlled loss into a catastrophic one.</div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title green">TAKE PROFIT PLACEMENT</div>
        <div class="lesson-p">Your take profit should always be at a level where price is likely to stall — the next major resistance (longs) or support (shorts). The grade provides a suggested target but here's how to think about it.</div>
        <div class="lesson-rule">
          <div class="rule-icon">🎯</div>
          <div>
            <div class="rule-title">Minimum 1:2 Risk/Reward</div>
            <div class="rule-body">If your stop is 20 pips away, your target must be at least 40 pips away. Never take a trade with less than 1:2 R:R. This means you only need to be right 40% of the time to be profitable.</div>
            <div class="rule-example">SL = 20 pips → TP minimum = 40 pips (1:2 R:R)</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">🌀</div>
          <div>
            <div class="rule-title">Use Fibonacci Extensions</div>
            <div class="rule-body">The 1.272 and 1.618 Fibonacci extension levels are common take profit targets after a breakout or retracement entry. Your grade will flag these when visible.</div>
          </div>
        </div>
        <div class="lesson-rule">
          <div class="rule-icon">📊</div>
          <div>
            <div class="rule-title">Previous Swing High/Low</div>
            <div class="rule-body">The most reliable take profit is the previous swing high (for longs) or swing low (for shorts). These are proven levels where price has reversed before.</div>
          </div>
        </div>
        <div class="callout green"><strong>✅ Pro Strategy</strong>Set TP1 at 1:1 R:R to close half your position, then let the rest run to TP2 at 1:2 or 1:3. This way you always lock in some profit.</div>
      </div>
    </div>

    <!-- LESSON 4: Options Basics -->
    <div class="academy-lesson" id="lesson-options">
      <div class="lesson-section">
        <div class="lesson-section-title purple">OPTIONS FUNDAMENTALS</div>
        <div class="lesson-p">Options give you the right (but not the obligation) to buy or sell an asset at a specific price before a specific date. They let you control more with less capital and define your maximum risk upfront.</div>
        <div class="two-col">
          <div class="info-card">
            <div class="info-card-title" style="color:var(--accent2);">CALL OPTION</div>
            <p>The right to <strong>BUY</strong> at the strike price. You buy calls when you're bullish — expecting price to go UP.</p>
            <p style="color:var(--muted);font-size:12px;">Max loss = premium paid. Unlimited upside potential.</p>
          </div>
          <div class="info-card">
            <div class="info-card-title" style="color:var(--danger);">PUT OPTION</div>
            <p>The right to <strong>SELL</strong> at the strike price. You buy puts when you're bearish — expecting price to go DOWN.</p>
            <p style="color:var(--muted);font-size:12px;">Max loss = premium paid. Profit as price falls.</p>
          </div>
        </div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title purple">THE GREEKS — PLAIN ENGLISH</div>
        <div class="lesson-rule"><div class="rule-icon">Δ</div><div><div class="rule-title">Delta — How much the option moves</div><div class="rule-body">If Delta is 0.50, your option gains $0.50 for every $1 move in the stock. A Delta of 1.0 means it moves dollar for dollar. Higher Delta = deeper in the money.</div><div class="rule-example">Delta 0.60 → stock moves $1 → option gains $0.60</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">Γ</div><div><div class="rule-title">Gamma — How fast Delta changes</div><div class="rule-body">Gamma tells you how quickly Delta accelerates. High Gamma near expiration means small moves in the stock create large swings in option value.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">Θ</div><div><div class="rule-title">Theta — Time decay (your enemy as a buyer)</div><div class="rule-body">Options lose value every day just from time passing. Theta tells you how much per day. A Theta of -0.10 means you lose $10/day per contract (100 shares). This is why buying options close to expiration is risky.</div><div class="rule-example">30 DTE → manageable Theta. 3 DTE → Theta destroys your position fast.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">V</div><div><div class="rule-title">Vega — Sensitivity to volatility</div><div class="rule-body">When IV rises, option premiums rise (good if you own them, bad if you sold them). A Vega of 0.20 means a 1% rise in IV adds $0.20 to your option's value.</div></div></div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title purple">IMPLIED VOLATILITY (IV) — THE KEY TO OPTIONS</div>
        <div class="lesson-p">IV measures how expensive options are. High IV = expensive options. Low IV = cheap options. The single biggest mistake options traders make is buying expensive options in a high-IV environment.</div>
        <div class="lesson-rule"><div class="rule-icon">🔥</div><div><div class="rule-title">High IV (IV Rank 70–100)</div><div class="rule-body">Options are expensive. SELL options or use spreads to collect premium. Avoid buying naked options — you're overpaying and IV will likely drop after the event.</div><div class="rule-example">Sell Iron Condor, Covered Calls, Credit Spreads</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">❄️</div><div><div class="rule-title">Low IV (IV Rank 0–30)</div><div class="rule-body">Options are cheap. BUY options or use debit spreads. You're getting good value and have the potential to profit both from the move AND from IV expanding.</div><div class="rule-example">Buy Calls/Puts, Debit Spreads, Long Straddles</div></div></div>
        <div class="callout purple"><strong>💡 IV Rank Rule of Thumb</strong>IV Rank above 50: prefer selling. IV Rank below 30: prefer buying. Between 30–50: use spreads either way.</div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title purple">COMMON OPTIONS STRATEGIES</div>
        <div class="lesson-rule"><div class="rule-icon">📈</div><div><div class="rule-title">Long Call</div><div class="rule-body">Buy a call option. Bullish. Max loss = premium paid. Best in low IV environments. Simple and directional.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📉</div><div><div class="rule-title">Long Put</div><div class="rule-body">Buy a put option. Bearish. Max loss = premium paid. Great for hedging or when you expect a sharp drop.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">↕️</div><div><div class="rule-title">Straddle</div><div class="rule-body">Buy both a call and put at the same strike. Profit from a big move in either direction. Best before earnings or major news events when you expect volatility but don't know direction.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🦅</div><div><div class="rule-title">Bull Call Spread</div><div class="rule-body">Buy a lower strike call, sell a higher strike call. Reduces cost and max loss, but caps your upside. Best for moderately bullish setups.</div><div class="rule-example">Buy 450C / Sell 460C → max profit capped at 460</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🦅</div><div><div class="rule-title">Iron Condor</div><div class="rule-body">Sell a put spread + sell a call spread. Profit from the stock staying in a range. Best in high IV environments when you expect low movement.</div></div></div>
      </div>
    </div>

    <!-- LESSON 5: Risk Management -->
    <div class="academy-lesson" id="lesson-risk">
      <div class="lesson-section">
        <div class="lesson-section-title danger">THE GOLDEN RULES OF RISK MANAGEMENT</div>
        <div class="lesson-p">Risk management is the difference between traders who last and traders who blow up. Even a 50% win rate is extremely profitable with proper risk management. These rules are non-negotiable.</div>
        <div class="lesson-rule"><div class="rule-icon">💰</div><div><div class="rule-title">Rule 1: Never Risk More Than 1–2% Per Trade</div><div class="rule-body">On a $10,000 account, your max loss per trade is $100–$200. This means even 10 losing trades in a row only costs you 10–20%. Your account survives to fight another day.</div><div class="rule-example">$10,000 account × 1% = $100 max risk per trade</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📊</div><div><div class="rule-title">Rule 2: Position Size Based on Stop Distance</div><div class="rule-body">Your position size is determined by your risk amount AND your stop distance — not by how much you "feel like" trading. Use this formula: Position Size = Risk Amount ÷ Stop Distance in pips/points.</div><div class="rule-example">Risk $100 ÷ 20 pip stop = 0.5 lots (forex) or 5 shares (stocks)</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🚦</div><div><div class="rule-title">Rule 3: Grade Minimum Before Trading</div><div class="rule-body">Only take trades that score B or higher with 70%+ confidence. Trading C-grade setups is gambling. Your edge only works when you're selective.</div><div class="rule-example">Grade B + 70% confidence → take it. Grade C + 55% confidence → skip it.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📅</div><div><div class="rule-title">Rule 4: Daily Loss Limit</div><div class="rule-body">Set a maximum daily loss of 3–5% of your account. If you hit it, stop trading for the day. Bad days happen — don't let one bad day become a catastrophic loss from revenge trading.</div><div class="rule-example">$10,000 account → stop trading after -$300 to -$500 in one day</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🔢</div><div><div class="rule-title">Rule 5: Max 3 Open Trades at Once</div><div class="rule-body">More trades = more exposure and more emotional noise. Focus on quality over quantity. Three well-selected trades beat ten mediocre ones every time.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">📓</div><div><div class="rule-title">Rule 6: Keep a Trade Journal</div><div class="rule-body">Log every trade: grade, confidence score, entry, exit, result, and what you learned. Review weekly. Patterns in your winners and losers are worth more than any indicator.</div></div></div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title danger">POSITION SIZING CALCULATOR</div>
        <div class="lesson-p">Use this to calculate exactly how many shares, lots, or contracts to trade based on your risk rules.</div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
            <div><div class="lesson-section-title" style="margin-bottom:6px;border:none;padding:0;font-size:9px;">ACCOUNT SIZE ($)</div><input type="number" class="text-input" id="calc-account" placeholder="e.g. 10000" oninput="calcPosition()"></div>
            <div><div class="lesson-section-title" style="margin-bottom:6px;border:none;padding:0;font-size:9px;">RISK % PER TRADE</div><input type="number" class="text-input" id="calc-risk" placeholder="e.g. 1" step="0.1" oninput="calcPosition()"></div>
            <div><div class="lesson-section-title" style="margin-bottom:6px;border:none;padding:0;font-size:9px;">ENTRY PRICE</div><input type="number" class="text-input" id="calc-entry" placeholder="e.g. 450.00" step="0.01" oninput="calcPosition()"></div>
            <div><div class="lesson-section-title" style="margin-bottom:6px;border:none;padding:0;font-size:9px;">STOP LOSS PRICE</div><input type="number" class="text-input" id="calc-stop" placeholder="e.g. 445.00" step="0.01" oninput="calcPosition()"></div>
          </div>
          <div id="calc-result" style="display:none;background:var(--surface);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:16px;">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;">
              <div><div style="font-family:'Space Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">MAX RISK $</div><div style="font-size:22px;font-weight:700;color:var(--danger);" id="calc-maxrisk">—</div></div>
              <div><div style="font-family:'Space Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">STOP DISTANCE</div><div style="font-size:22px;font-weight:700;color:var(--warn);" id="calc-stopdist">—</div></div>
              <div><div style="font-family:'Space Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">POSITION SIZE</div><div style="font-size:22px;font-weight:700;color:var(--accent2);" id="calc-possize">—</div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="lesson-section">
        <div class="lesson-section-title danger">MINDSET RULES</div>
        <div class="lesson-rule"><div class="rule-icon">🧘</div><div><div class="rule-title">Your job is to execute, not predict</div><div class="rule-body">You will never know if a trade will win before you take it. Your job is to take good setups consistently and let probabilities play out over many trades.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">😤</div><div><div class="rule-title">Never revenge trade</div><div class="rule-body">After a loss, the worst thing you can do is immediately enter a new trade to "make it back." Walk away, review what happened, and only trade again when you're calm.</div></div></div>
        <div class="lesson-rule"><div class="rule-icon">🏆</div><div><div class="rule-title">Think in probabilities, not certainties</div><div class="rule-body">Even an A+ grade doesn't guarantee a win. It means the odds are strongly in your favor. Losses are part of the game — manage them, don't fear them.</div></div></div>
        <div class="callout danger"><strong>🚫 The #1 Killer of Trading Accounts</strong>Overleveraging + no stop loss + revenge trading. These three things alone account for the vast majority of blown accounts. The platform protects you by grading setups — but you have to follow the rules.</div>
      </div>
    </div>
  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", function() {
let imageBase64 = null;
let imageMediaType = null;
let imageBase642 = null;
let imageMediaType2 = null;
let currentMode = 'chart';

function toggleMTF() {
  const show = document.getElementById('enableMTF').value === 'yes';
  document.getElementById('mtfPanel').style.display = show ? 'block' : 'none';
  if (!show) { imageBase642 = null; imageMediaType2 = null; }
}

function handleDrop2(e) {
  e.preventDefault();
  document.getElementById('mtfDropZone').style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile2(file);
}

function loadFile2(file) {
  imageMediaType2 = file.type || 'image/png';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase642 = e.target.result.split(',')[1];
    document.getElementById('previewImg2').src = e.target.result;
    document.getElementById('mtfPreview').style.display = 'block';
    document.getElementById('mtfDropZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const chartPreview = document.getElementById('chartPreview');
const previewImg = document.getElementById('previewImg');
const analyzeBtn = document.getElementById('analyzeBtn');
const loadingState = document.getElementById('loadingState');
const resultsDiv = document.getElementById('results');

function setMode(mode) {
  currentMode = mode;
  ['chart','options','assistant','journal','academy'].forEach(m => {
    const el = document.getElementById('mode-' + m);
    const tab = document.getElementById('tab-' + m);
    if (el) el.style.display = mode === m ? 'block' : 'none';
    if (tab) tab.classList.toggle('active', mode === m);
  });
  if (!['academy','assistant','journal'].includes(mode)) resultsDiv.style.display = 'none';
  if (mode === 'assistant' && chatHistory.length === 0) showWelcomeMessage();
  if (mode === 'journal') renderJournal();
}

function toggleOptionsPanel() {
  const val = document.getElementById('includeOptions').value;
  document.getElementById('optionsPanel').classList.toggle('visible', val === 'yes');
}

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
uploadZone.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') fileInput.click(); });

function loadFile(file) {
  imageMediaType = file.type || 'image/png';
  const reader = new FileReader();
  reader.onload = e => {
    const result = e.target.result;
    imageBase64 = result.split(',')[1];
    previewImg.src = result;
    chartPreview.style.display = 'block';
    analyzeBtn.style.display = 'block';
    uploadZone.style.display = 'none';
    resultsDiv.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function getGradeColor(grade) {
  if (!grade) return 'var(--muted)';
  if (grade.startsWith('A')) return 'var(--accent2)';
  if (grade.startsWith('B')) return 'var(--accent)';
  if (grade.startsWith('C')) return 'var(--warn)';
  return 'var(--danger)';
}
function getScoreColor(score) {
  if (score >= 75) return 'var(--accent2)';
  if (score >= 55) return 'var(--accent)';
  if (score >= 35) return 'var(--warn)';
  return 'var(--danger)';
}

function showLoading(steps) {
  loadingState.style.display = 'block';
  resultsDiv.style.display = 'none';
  const stepsEl = document.getElementById('loadingSteps');
  stepsEl.innerHTML = '';
  steps.forEach((step, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'loading-step';
      el.textContent = `↳ ${step}`;
      stepsEl.appendChild(el);
    }, i * 800);
  });
}

function getOptionsData() {
  return {
    ticker: document.getElementById('ticker').value,
    stockPrice: document.getElementById('stockPrice').value,
    strikePrice: document.getElementById('strikePrice').value,
    dte: document.getElementById('dte').value,
    optionType: document.getElementById('optionType').value,
    iv: document.getElementById('ivValue').value,
    ivRank: document.getElementById('ivRank').value,
    pcRatio: document.getElementById('pcRatio').value,
    unusualFlow: document.getElementById('unusualFlow').value,
    premium: document.getElementById('optionPremium').value
  };
}

async function callClaude(systemPrompt, userContent) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  const data = await response.json();
  const text = data.content.map(i => i.text || '').join('');
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function analyzeChart() {

function renderGreeks(greeks) {
  const greekList = [
    { key: 'delta', symbol: 'Δ', name: 'DELTA', color: 'var(--accent)' },
    { key: 'gamma', symbol: 'Γ', name: 'GAMMA', color: 'var(--accent2)' },
    { key: 'theta', symbol: 'Θ', name: 'THETA', color: 'var(--danger)' },
    { key: 'vega', symbol: 'V', name: 'VEGA', color: 'var(--purple)' }
  ];
  return greekList.map(g => {
    const greek = greeks[g.key] || { value: '—', interpretation: 'N/A' };
    return `<div class="greek-card">
      <div class="greek-symbol" style="color:${g.color};">${g.symbol}</div>
      <div class="greek-name">${g.name}</div>
      <div class="greek-value" style="color:${g.color};">${greek.value}</div>
      <div class="greek-interp">${greek.interpretation}</div>
    </div>`;
  }).join('');
}

function renderResults(r, includeOptions) {

  const biasIcon = r.bias === 'LONG' ? '▲' : r.bias === 'SHORT' ? '▼' : '◆';
  const verdictClass = r.verdict?.includes('TAKE') ? 'take' : r.verdict?.includes('SKIP') ? 'skip' : 'wait';
  const verdictColor = verdictClass === 'take' ? 'var(--accent2)' : verdictClass === 'skip' ? 'var(--danger)' : 'var(--warn)';

  const strategyOrder = [
    { key: 'price_action', label: 'Price Action / Candlesticks', icon: '🕯️' },
    { key: 'support_resistance', label: 'Support & Resistance', icon: '📐' },
    { key: 'moving_averages', label: 'Moving Averages', icon: '📈' },
    { key: 'rsi_macd', label: 'RSI / MACD Momentum', icon: '⚡' },
    { key: 'fibonacci', label: 'Fibonacci Levels', icon: '🌀' },

    { key: 'volume', label: 'Volume Analysis', icon: '📊' },

    { key: 'fvg_orderblocks', label: 'Fair Value Gaps & Order Blocks', icon: '🧱' },
    { key: 'vwap_squeeze', label: 'VWAP & Volatility Squeeze', icon: '🎯' }

  const strategiesHTML = strategyOrder.map(s => {
    const strat = r.strategies?.[s.key] || { score: 0, signal: 'neutral', detail: 'Not visible' };
    const sColor = getScoreColor(strat.score);
    const sIcon = strat.signal === 'bullish' ? '✅' : strat.signal === 'bearish' ? '🔴' : '⚪';

  const bullishHTML = (r.bullish_factors || []).map(f => `<div class="check-item"><span class="check-icon" style="color:var(--accent2);">✅</span><span>${f}</span></div>`).join('');

  resultsDiv.innerHTML = `

        <div class="grade-label">SIGNAL GRADE</div>

        <div class="confidence-label">CONFIDENCE</div>
      </div>
    </div>

    <div class="levels-grid">
      <div class="level-card">
        <div class="level-card-label">ENTRY ZONE</div>
        <div class="level-card-value" style="color:var(--accent);">${r.entry_zone || '—'}</div>
        <div class="level-card-sub">Suggested entry</div>
      </div>
      <div class="level-card">
        <div class="level-card-label">STOP LOSS</div>
        <div class="level-card-value" style="color:var(--danger);">${r.stop_loss || '—'}</div>

      <div class="level-card">

        <div class="level-card-value" style="color:var(--accent2);">${r.target || '—'}</div>
        <div class="level-card-sub">Take profit</div>
      </div>
      <div class="level-card">
        <div class="level-card-label">R:R RATIO</div>
        <div class="level-card-value" style="color:var(--purple);">${r.rr_ratio || '—'}</div>
        <div class="level-card-sub">Risk/Reward</div>
      </div>
    </div>

    <div class="strategy-breakdown">
      <div class="breakdown-title">TECHNICAL STRATEGY BREAKDOWN</div>
      ${strategiesHTML}

    ${includeOptions && r.options ? renderOptionsSection(r.options) : ''}

function formatAIText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<span class="term">$1</span>')
    .replace(/\n\n/g, '</p><p style="margin-top:8px;">')
    .replace(/\n- /g, '</p><li>')
    .replace(/\n(\d+)\. /g, '</p><li>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function fetchPrice(symbol, market) {
  const id = symbol.replace('/','_');
  const priceEl = document.getElementById('pprice-' + id);
  const changeEl = document.getElementById('pchange-' + id);
  const metaEl = document.getElementById('pmeta-' + id);
  if (!priceEl) return;

  try {
    let url, data, price, change, changePct, open, high, low, volume;

    if (market === 'forex' || market === 'commodity') {
      // Alpha Vantage FX
      const fromCur = symbol.includes('/') ? symbol.split('/')[0] : symbol.slice(0,3);
      const toCur = symbol.includes('/') ? symbol.split('/')[1] : symbol.slice(3,6);
      url = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${fromCur}&to_currency=${toCur}&apikey=${AV_KEY}`;
      const res = await fetch(url);
      data = await res.json();
      const rate = data['Realtime Currency Exchange Rate'];
      if (rate) {
        price = parseFloat(rate['5. Exchange Rate']).toFixed(5);
        const bid = parseFloat(rate['8. Bid Price']);
        const ask = parseFloat(rate['9. Ask Price']);
        change = '—';
        changePct = '';
        priceEl.textContent = price;
        priceEl.style.color = 'var(--text)';
        changeEl.textContent = `Bid: ${bid.toFixed(5)} · Ask: ${ask.toFixed(5)}`;
        changeEl.style.color = 'var(--muted)';
        if (metaEl) metaEl.innerHTML = `<div class="price-meta-item">Last Refreshed: <span>${rate['6. Last Refreshed']?.slice(11,16) || '—'} UTC</span></div>`;
      } else {
        priceEl.textContent = 'N/A'; changeEl.textContent = 'Check symbol'; changeEl.style.color = 'var(--warn)';
      }

    } else if (market === 'crypto') {
      // Alpha Vantage Crypto
      const fromC = symbol.includes('/') ? symbol.split('/')[0] : symbol;
      url = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${fromC}&to_currency=USD&apikey=${AV_KEY}`;
      const res = await fetch(url);
      data = await res.json();
      const rate = data['Realtime Currency Exchange Rate'];
      if (rate) {
        price = parseFloat(rate['5. Exchange Rate']);
        const formatted = price > 100 ? price.toFixed(2) : price > 1 ? price.toFixed(4) : price.toFixed(6);
        priceEl.textContent = '$' + formatted;
        priceEl.style.color = 'var(--text)';
        changeEl.textContent = `Ask: $${parseFloat(rate['9. Ask Price']).toFixed(price>100?2:4)}`;
        changeEl.style.color = 'var(--muted)';
        if (metaEl) metaEl.innerHTML = `<div class="price-meta-item">Updated: <span>${rate['6. Last Refreshed']?.slice(11,16) || '—'} UTC</span></div>`;
      } else {
        priceEl.textContent = 'N/A'; changeEl.textContent = 'Check symbol'; changeEl.style.color = 'var(--warn)';
      }

    } else {
      // Alpha Vantage Stock Quote
      url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`;
      const res = await fetch(url);
      data = await res.json();
      const q = data['Global Quote'];
      if (q && q['05. price']) {
        price = parseFloat(q['05. price']).toFixed(2);
        change = parseFloat(q['09. change']).toFixed(2);
        changePct = parseFloat(q['10. change percent']).toFixed(2);
        const isUp = parseFloat(change) >= 0;
        priceEl.textContent = '$' + price;
        priceEl.style.color = 'var(--text)';
        changeEl.textContent = `${isUp?'+':''}${change} (${isUp?'+':''}${changePct}%)`;
        changeEl.style.color = isUp ? 'var(--accent2)' : 'var(--danger)';
        if (metaEl) metaEl.innerHTML = `
          <div class="price-meta-item">Open: <span>$${parseFloat(q['02. open']).toFixed(2)}</span></div>
          <div class="price-meta-item">High: <span style="color:var(--accent2);">$${parseFloat(q['03. high']).toFixed(2)}</span></div>
          <div class="price-meta-item">Low: <span style="color:var(--danger);">$${parseFloat(q['04. low']).toFixed(2)}</span></div>
          <div class="price-meta-item">Vol: <span>${parseInt(q['06. volume']).toLocaleString()}</span></div>`;
      } else {
        priceEl.textContent = 'N/A'; changeEl.textContent = 'Check symbol or API limit'; changeEl.style.color = 'var(--warn)';
      }
    }
  } catch(e) {
    if (priceEl) { priceEl.textContent = 'ERR'; changeEl.textContent = 'Network error'; changeEl.style.color = 'var(--danger)'; }
  }
  // Update last refreshed time
  const lu = document.getElementById('priceLastUpdated');
  if (lu) lu.textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

function renderCalendar() {
  const container = document.getElementById('calendarContent');
  const now = new Date();

  // Filter
  let filtered = calendarData.filter(e => {
    if (calFilterLevel === 'all') return true;
    const imp = (e.impact||'').toLowerCase();
    if (calFilterLevel === 'high') return imp === 'high' || imp === '3' || imp === 'red';
    if (calFilterLevel === 'medium') return imp === 'medium' || imp === '2' || imp === 'orange' || imp === 'yellow';
    if (calFilterLevel === 'low') return imp === 'low' || imp === '1' || imp === 'gray' || imp === 'grey' || imp === 'white';
    return true;
  });

  if (!filtered.length) { container.innerHTML = '<div class="cal-empty">No events found for this filter.</div>'; return; }

  // Check for upcoming high-impact events within 2 hours
  const upcoming = filtered.filter(e => {
    if (!e.time || (e.impact||'').toLowerCase() !== 'high') return false;
    const eventTime = new Date(e.date + 'T' + (e.time.includes(':') ? e.time : '00:00') + ':00');
    const diff = (eventTime - now) / 60000;
    return diff > 0 && diff <= 120;
  });

  const warnerBanner = document.getElementById('calWarningBanner');
  if (upcoming.length) {
    warnerBanner.classList.add('show');
    document.getElementById('calWarningText').innerHTML = `<strong style="color:var(--danger);">⚠️ HIGH IMPACT EVENT WITHIN 2 HOURS:</strong> ${upcoming.map(e=>e.event+' ('+e.time+')').join(', ')} — Consider avoiding new trades until after the release.`;
  } else {
    warnerBanner.classList.remove('show');
  }

  // Group by date
  const byDate = {};
  filtered.forEach(e => {
    const d = e.date || 'Unknown';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  });

  const impactLevel = imp => {
    const i = (imp||'').toLowerCase();
    if (i === 'high' || i === '3' || i === 'red') return 'high';
    if (i === 'medium' || i === '2' || i === 'orange' || i === 'yellow') return 'medium';
    return 'low';
  };

  const impactLabel = imp => {
    const l = impactLevel(imp);
    if (l === 'high') return '🔴';
    if (l === 'medium') return '🟡';
    return '⚪';
  };

  let html = '';
  Object.entries(byDate).sort((a,b) => a[0] > b[0] ? 1 : -1).forEach(([date, events]) => {
    const d = new Date(date + 'T12:00:00');
    const isToday = date === now.toISOString().slice(0,10);
    const isTomorrow = date === new Date(now.getTime()+86400000).toISOString().slice(0,10);
    const label = isToday ? '📅 TODAY' : isTomorrow ? '📅 TOMORROW' : '📅 ' + d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    html += `<div class="cal-section-label">${label}</div><div class="calendar-list">`;
    events.sort((a,b) => (a.time||'') > (b.time||'') ? 1 : -1).forEach(e => {
      const level = impactLevel(e.impact);
      const hasActual = e.actual !== null && e.actual !== undefined && e.actual !== '';
      const isBetter = hasActual && e.estimate && parseFloat(e.actual) >= parseFloat(e.estimate);
      const timeStr = e.time ? e.time.slice(0,5) : 'All Day';
      const eventTime = e.time ? new Date(e.date + 'T' + e.time + ':00') : null;
      const isPast = eventTime && eventTime < now;
      const isSoon = eventTime && !isPast && (eventTime - now) / 60000 <= 60;
      html += `<div class="cal-event ${level}" style="${isSoon?'border-color:rgba(255,71,87,0.5);background:rgba(255,71,87,0.03);':''}${isPast?'opacity:0.55;':''}">
        <div class="cal-time" style="${isSoon?'color:var(--danger);font-weight:700;':''}">${timeStr}${isSoon?' 🔔':''}</div>
        <div class="cal-dot ${level}"></div>
        <div>
          <div class="cal-name">${e.event || 'Economic Event'}</div>
          <div class="cal-country">${e.country||''} ${impactLabel(e.impact)} ${level.toUpperCase()}</div>
        </div>
        <div class="cal-figures">
          ${hasActual ? `<div class="cal-actual-val ${isBetter?'bull':'bear'}">${e.actual}</div><div class="cal-prev">Est: ${e.estimate||'—'}</div>` : `<div class="cal-upcoming" style="font-size:11px;">${e.estimate?'Est: '+e.estimate:'Upcoming'}</div><div class="cal-prev">Prev: ${e.prev||'—'}</div>`}
        </div>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderHeatmap() {
  loadTrades();
  const byDate = {};
  trades.forEach(t => { if (t.date) { byDate[t.date] = (byDate[t.date]||0) + (parseFloat(t.pnl)||0); } });
  const now = new Date();
  const start = new Date(now); start.setFullYear(start.getFullYear()-1);
  const days = [];
  for (let d = new Date(start); d <= now; d.setDate(d.getDate()+1)) {
    const key = d.toISOString().slice(0,10);
    days.push({ date: key, pnl: byDate[key] || null });
  }
  const maxAbs = Math.max(...days.filter(d=>d.pnl!==null).map(d=>Math.abs(d.pnl)), 1);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = '<div style="overflow-x:auto;"><div style="min-width:680px;">';
  html += '<div style="display:flex;gap:3px;margin-bottom:4px;padding-left:28px;">';
  let lastMonth = -1;
  days.forEach((d,i) => {
    const m = new Date(d.date+'T12:00:00').getMonth();
    if (m !== lastMonth) { html += `<span style="font-family:'Space Mono',ui-monospace,monospace;font-size:8px;color:var(--muted);flex:0 0 auto;">${months[m]}</span>`; lastMonth = m; }
  });
  html += '</div><div style="display:flex;gap:3px;">';
  const dayLabels = ['','M','','W','','F',''];
  dayLabels.forEach(l => html += `<div style="font-family:'Space Mono',ui-monospace,monospace;font-size:8px;color:var(--muted);width:24px;display:flex;flex-direction:column;justify-content:space-around;gap:3px;">${l}</div>`);
  // Group by week
  const firstDow = new Date(days[0].date+'T12:00:00').getDay();
  html += '<div style="display:flex;flex-direction:column;gap:3px;flex-wrap:wrap;height:98px;">';
  for (let i=0;i<firstDow;i++) html += `<div style="width:12px;height:12px;"></div>`;
  days.forEach(d => {
    let color = '#1e2d3d';
    if (d.pnl !== null) {
      const intensity = Math.min(Math.abs(d.pnl)/maxAbs, 1);
      if (d.pnl > 0) { const g = Math.floor(20 + intensity*235); color = `rgb(0,${g},${Math.floor(g*0.53)})`; }
      else { const r = Math.floor(60 + intensity*195); color = `rgb(${r},${Math.floor(r*0.27)},${Math.floor(r*0.34)})`; }
    }
    const pnlStr = d.pnl !== null ? (d.pnl>=0?'+':'')+'$'+d.pnl.toFixed(2) : 'No trades';
    html += `<div title="${d.date}: ${pnlStr}" style="width:12px;height:12px;border-radius:2px;background:${color};cursor:pointer;" onclick="alert('${d.date}\\nP&L: ${pnlStr}')"></div>`;
  });
  html += '</div></div></div></div>';
  document.getElementById('heatmapGrid').innerHTML = html;
}

function renderDrawdown() {
  loadTrades();
  const sorted = [...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let peak = 0, running = 0, maxDD = 0, maxDDPct = 0;
  const labels = ['Start'], ddData = [0], equData = [0];
  sorted.forEach(t => {
    running += parseFloat(t.pnl)||0;
    if (running > peak) peak = running;
    const dd = peak > 0 ? ((running-peak)/peak)*100 : 0;
    if (dd < maxDD) maxDD = dd;
    labels.push(t.date?t.date.slice(5):'');
    ddData.push(parseFloat(dd.toFixed(2)));
    equData.push(parseFloat(running.toFixed(2)));
  });
  const currentDD = ddData[ddData.length-1] || 0;
  const recoveryNeeded = currentDD < 0 ? ((-currentDD/(100+currentDD))*100).toFixed(1) : 0;
  document.getElementById('drawdownStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">MAX DRAWDOWN</div><div class="stat-value" style="color:var(--danger);">${maxDD.toFixed(1)}%</div><div class="stat-sub">Worst peak-to-trough</div></div>
    <div class="stat-card"><div class="stat-label">CURRENT DD</div><div class="stat-value" style="color:${currentDD<0?'var(--danger)':'var(--accent2)'};">${currentDD.toFixed(1)}%</div><div class="stat-sub">From equity peak</div></div>
    <div class="stat-card"><div class="stat-label">EQUITY PEAK</div><div class="stat-value" style="color:var(--accent2);">$${peak.toFixed(2)}</div><div class="stat-sub">All-time high P&L</div></div>
    <div class="stat-card"><div class="stat-label">RECOVERY NEEDED</div><div class="stat-value" style="color:${recoveryNeeded>0?'var(--warn)':'var(--accent2)'};">${recoveryNeeded}%</div><div class="stat-sub">To reach new high</div></div>`;

function calcRORFromJournal() {
  loadTrades();
  const s = calcStats();
  if (s.total > 0) {
    document.getElementById('ror-wr').value = parseFloat(s.winRate);
    document.getElementById('ror-win').value = s.avgWin.toFixed(2);
    document.getElementById('ror-loss').value = s.avgLoss.toFixed(2);
  }
  calcROR();
}

function calcROR() {
  const wr = parseFloat(document.getElementById('ror-wr').value)/100;
  const avgWin = parseFloat(document.getElementById('ror-win').value);
  const avgLoss = parseFloat(document.getElementById('ror-loss').value);
  const account = parseFloat(document.getElementById('ror-account').value) || 10000;
  const threshold = parseFloat(document.getElementById('ror-threshold').value)/100 || 0.5;
  const riskPct = parseFloat(document.getElementById('ror-risk-pct').value)/100 || 0.01;
  if (!wr || !avgWin || !avgLoss) { document.getElementById('rorResult').style.display='none'; return; }
  const lr = 1-wr;
  const edge = (wr*avgWin) - (lr*avgLoss);
  let ror = 0;
  if (edge <= 0) { ror = 99.9; }
  else {
    const A = avgWin * riskPct * account;
    const B = avgLoss * riskPct * account;
    const R = A/B;
    ror = Math.min(99.9, Math.max(0, Math.pow(lr/wr, threshold*account/(riskPct*account*avgLoss)) * 100));
    if (R > 0 && wr > 0) {
      const q = lr/wr;
      ror = Math.min(99.9, Math.pow(q, threshold/riskPct) * 100);
    }
  }
  ror = Math.min(99.9, Math.max(0.01, ror)).toFixed(1);
  const col = ror > 25 ? 'var(--danger)' : ror > 10 ? 'var(--warn)' : 'var(--accent2)';
  const msg = ror > 25 ? '⚠️ High risk of blowing your account. Reduce position size or improve your win rate.' : ror > 10 ? '⚡ Moderate risk. Consider tightening your risk per trade.' : '✅ Low risk of ruin. Your strategy has a solid edge with proper risk management.';
  document.getElementById('rorPct').textContent = ror + '%';
  document.getElementById('rorPct').style.color = col;
  document.getElementById('rorMsg').textContent = msg;
  document.getElementById('rorResult').style.display = 'block';
}

function renderExpectancy() {
  loadTrades();
  const s = calcStats();
  if (s.total < 3) { document.getElementById('expectancyResult').innerHTML = '<p style="color:var(--muted);font-size:13px;">Log at least 3 trades in your journal to calculate expectancy.</p>'; return; }
  const wr = parseFloat(s.winRate)/100;
  const expectancy = (wr * s.avgWin) - ((1-wr) * s.avgLoss);
  const expPerRisk = s.avgLoss > 0 ? expectancy / s.avgLoss : 0;
  const col = expectancy > 0 ? 'var(--accent2)' : 'var(--danger)';
  document.getElementById('expectancyResult').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div style="text-align:center;"><div class="exp-value" style="color:${col};">${expectancy>=0?'+':''}$${expectancy.toFixed(2)}</div><div style="font-family:'Space Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:6px;">EXPECTANCY PER TRADE</div></div>
      <div style="text-align:center;"><div class="exp-value" style="color:${expPerRisk>=0?'var(--accent2)':'var(--danger)'};">${expPerRisk>=0?'+':''}${expPerRisk.toFixed(2)}R</div><div style="font-family:'Space Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:6px;">EXPECTANCY PER $RISKED</div></div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;line-height:1.7;">
      <strong style="color:${col};">${expectancy>0?'✅ Positive expectancy — your strategy has an edge.':'❌ Negative expectancy — your strategy loses money over time.'}</strong><br>
      Based on ${s.total} trades: ${s.winRate}% win rate, avg win $${s.avgWin.toFixed(2)}, avg loss $${s.avgLoss.toFixed(2)}.<br>
      ${expectancy>0?`Over 100 trades you can expect approximately <strong>$${(expectancy*100).toFixed(0)}</strong> in profit.`:`You need to either increase your win rate, increase your avg win, or decrease your avg loss to become profitable.`}

}

  document.querySelectorAll('.journal-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.journal-panel').forEach(p => p.classList.remove('active'));
  const tabs = ['dashboard','log','trades','pnl'];
  document.querySelectorAll('.journal-tab')[tabs.indexOf(tab)].classList.add('active');
  document.getElementById('jpanel-' + tab).classList.add('active');
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'trades') renderTradesTable();
  if (tab === 'pnl') renderPnL();
}

function renderJournal() {
  loadTrades();
  const today = new Date().toISOString().split('T')[0];
  const dateEl = document.getElementById('log-date');
  if (dateEl && !dateEl.value) dateEl.value = today;
  renderDashboard();
}

function calcStats() {
  const total = trades.length;
  const wins = trades.filter(t => t.outcome === 'win').length;
  const losses = trades.filter(t => t.outcome === 'loss').length;
  const be = trades.filter(t => t.outcome === 'breakeven').length;
  const winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
  const totalPnL = trades.reduce((s, t) => s + (parseFloat(t.pnl) || 0), 0);
  const avgWin = wins > 0 ? trades.filter(t => t.outcome==='win').reduce((s,t)=>s+(parseFloat(t.pnl)||0),0)/wins : 0;
  const avgLoss = losses > 0 ? Math.abs(trades.filter(t=>t.outcome==='loss').reduce((s,t)=>s+(parseFloat(t.pnl)||0),0)/losses) : 0;
  const profitFactor = (avgLoss > 0 && losses > 0) ? ((avgWin * wins) / (avgLoss * losses)).toFixed(2) : wins > 0 ? '∞' : '0.00';
  const streak = calcStreak();
  return { total, wins, losses, be, winRate, totalPnL, avgWin, avgLoss, profitFactor, streak };
}

function calcStreak() {
  if (!trades.length) return { current: 0, type: '' };
  const sorted = [...trades].sort((a,b) => new Date(b.date)-new Date(a.date));
  let count = 1, type = sorted[0].outcome;
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i].outcome === type) count++; else break;
  }
  return { current: count, type };
}

function renderDashboard() {
  loadTrades();
  const s = calcStats();
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">TOTAL P&L</div>
      <div class="stat-value" style="color:${s.totalPnL>=0?'var(--accent2)':'var(--danger)'};">${s.totalPnL>=0?'+':''}$${s.totalPnL.toFixed(2)}</div>
      <div class="stat-sub">${s.total} trades logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">WIN RATE</div>
      <div class="stat-value" style="color:${s.winRate>=50?'var(--accent2)':'var(--warn)'};">${s.winRate}%</div>
      <div class="stat-sub">${s.wins}W / ${s.losses}L / ${s.be}BE</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PROFIT FACTOR</div>
      <div class="stat-value" style="color:${parseFloat(s.profitFactor)>=1.5?'var(--accent2)':parseFloat(s.profitFactor)>=1?'var(--warn)':'var(--danger)'};">${s.profitFactor}</div>
      <div class="stat-sub">Avg Win: $${s.avgWin.toFixed(2)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CURRENT STREAK</div>
      <div class="stat-value" style="color:${s.streak.type==='win'?'var(--accent2)':s.streak.type==='loss'?'var(--danger)':'var(--muted)'};">${s.streak.current}</div>
      <div class="stat-sub">${s.streak.type?s.streak.type.toUpperCase()+' streak':'No trades yet'}</div>
    </div>`;
  renderEquityChart();
  renderGradePerf();
  renderMarketChart();
}

function renderEquityChart() {
  const sorted = [...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let running = 0;
  const labels = ['Start'], data = [0];
  sorted.forEach(t => { running += parseFloat(t.pnl)||0; labels.push(t.date?t.date.slice(5):''); data.push(parseFloat(running.toFixed(2))); });
  const ctx = document.getElementById('equityChart').getContext('2d');
  if (equityChartInst) equityChartInst.destroy();
  const color = data[data.length-1] >= 0 ? '#00ff88' : '#ff4757';
  equityChartInst = new Chart(ctx, {
    type:'line', data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'15',borderWidth:2,fill:true,tension:0.3,pointRadius:data.length>30?0:3,pointBackgroundColor:color}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:9}},grid:{color:'#1e2d3d'}},y:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:9},callback:v=>'$'+v},grid:{color:'#1e2d3d'}}}}
  });
}

function renderGradePerf() {
  const grades = ['A','B','C','D','F'];
  const gradeColors = {A:'var(--accent2)',B:'var(--accent)',C:'var(--warn)',D:'var(--danger)',F:'#666'};
  const html = grades.map(g => {
    const m = trades.filter(t=>t.grade&&t.grade.startsWith(g));
    const w = m.filter(t=>t.outcome==='win').length;
    const wr = m.length>0?((w/m.length)*100).toFixed(0):0;
    const pnl = m.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
    const c = gradeColors[g];
    return `<div class="grade-perf-card"><div class="grade-perf-letter" style="color:${c};">${g}</div><div class="grade-perf-stat" style="color:${c};">${wr}% WR</div><div class="grade-perf-bar-wrap"><div class="grade-perf-bar" style="width:${wr}%;background:${c};"></div></div><div class="grade-perf-count">${m.length} trades</div><div class="grade-perf-count" style="color:${pnl>=0?'var(--accent2)':'var(--danger)'};">${pnl>=0?'+':''}$${pnl.toFixed(0)}</div></div>`;
  }).join('');
  document.getElementById('gradePerfGrid').innerHTML = html;
}

function renderMarketChart() {
  const markets = ['forex','stocks','futures','commodities','crypto','options'];
  const pnlData = markets.map(m=>trades.filter(t=>t.market===m).reduce((s,t)=>s+(parseFloat(t.pnl)||0),0));
  const ctx = document.getElementById('marketChart').getContext('2d');
  if (marketChartInst) marketChartInst.destroy();
  marketChartInst = new Chart(ctx, {
    type:'bar', data:{labels:markets.map(m=>m.toUpperCase()),datasets:[{data:pnlData,backgroundColor:pnlData.map(v=>v>=0?'#00ff8844':'#ff475744'),borderColor:pnlData.map(v=>v>=0?'#00ff88':'#ff4757'),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:9}},grid:{color:'#1e2d3d'}},y:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:9},callback:v=>'$'+v},grid:{color:'#1e2d3d'}}}}
  });
}

let _tradeScreenshot = null;
function loadTradeScreenshot(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    _tradeScreenshot = e.target.result;
    document.getElementById('screenshot-preview-img').src = e.target.result;
    document.getElementById('screenshot-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

function logTrade() {
  const trade = {
    id: Date.now(),
    date: document.getElementById('log-date').value,
    symbol: document.getElementById('log-symbol').value.toUpperCase().trim(),
    market: document.getElementById('log-market').value,
    direction: document.getElementById('log-direction').value,
    grade: document.getElementById('log-grade').value,
    confidence: document.getElementById('log-confidence').value,
    entry: document.getElementById('log-entry').value,
    exit: document.getElementById('log-exit').value,
    size: document.getElementById('log-size').value,
    pnl: document.getElementById('log-pnl').value,
    rr: document.getElementById('log-rr').value,
    outcome: document.getElementById('log-outcome').value,
    tf: document.getElementById('log-tf').value,
    strategy: document.getElementById('log-strategy').value,
    emotion: document.getElementById('log-emotion').value,
    notes: document.getElementById('log-notes').value,
    screenshot: _tradeScreenshot || null
  };
  if (!trade.symbol || !trade.pnl || !trade.date) { alert('Please fill in: Date, Symbol, and P&L'); return; }
  loadTrades(); trades.push(trade); saveTrades();
  ['log-symbol','log-confidence','log-entry','log-exit','log-size','log-pnl','log-rr','log-strategy','log-emotion','log-notes'].forEach(id => document.getElementById(id).value = '');
  _tradeScreenshot = null;
  document.getElementById('log-screenshot').value = '';
  document.getElementById('screenshot-preview-wrap').style.display = 'none';
  const btn = document.querySelector('.log-submit-btn');
  btn.textContent = '✅ TRADE LOGGED!';
  btn.style.background = 'linear-gradient(135deg,var(--accent),#0099bb)';
  setTimeout(() => { btn.textContent = '+ LOG THIS TRADE'; btn.style.background=''; }, 2000);
}

function renderTradesTable() {
  loadTrades();
  const sorted = [...trades].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const body = document.getElementById('tradesTableBody');
  if (!sorted.length) { body.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">No trades logged yet</div><div class="empty-state-sub">Go to "Log Trade" to add your first trade</div></div>`; return; }
  const gc = g => { if(!g) return '#4a6070'; if(g.startsWith('A')) return '#00ff88'; if(g.startsWith('B')) return '#00d4ff'; if(g.startsWith('C')) return '#ffaa00'; return '#ff4757'; };
  body.innerHTML = `<table class="trades-table"><thead><tr><th>DATE</th><th>SYMBOL</th><th>MKT</th><th>DIR</th><th>GRADE</th><th>CONF</th><th>P&L</th><th>OUTCOME</th><th>STRATEGY</th><th>REVIEW</th><th></th></tr></thead><tbody>${sorted.map(t=>`<tr>
    <td style="font-family:'Space Mono',ui-monospace,monospace;font-size:11px;">${t.date||'—'}</td>
    <td style="font-weight:700;">${t.symbol||'—'}</td>
    <td style="font-size:11px;color:var(--muted);">${t.market||'—'}</td>
    <td style="color:${t.direction==='long'?'var(--accent2)':'var(--danger)'};font-family:'Space Mono',ui-monospace,monospace;font-size:11px;">${t.direction==='long'?'▲':'▼'} ${t.direction.toUpperCase()}</td>
    <td><span class="trade-grade-badge" style="color:${gc(t.grade)};background:${gc(t.grade)}22;">${t.grade||'—'}</span></td>
    <td style="font-family:'Space Mono',ui-monospace,monospace;font-size:11px;">${t.confidence?t.confidence+'%':'—'}</td>
    <td class="${parseFloat(t.pnl)>=0?'trade-pnl-pos':'trade-pnl-neg'}">${parseFloat(t.pnl)>=0?'+':''}$${parseFloat(t.pnl||0).toFixed(2)}</td>
    <td class="${t.outcome==='win'?'trade-win':t.outcome==='loss'?'trade-loss':''}">${t.outcome==='win'?'✅ WIN':t.outcome==='loss'?'❌ LOSS':'➖ BE'}</td>
    <td style="font-size:11px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.strategy||'—'}</td>
    <td><button style="padding:4px 10px;background:rgba(176,107,255,0.1);border:1px solid rgba(176,107,255,0.3);color:var(--purple);font-family:'Space Mono',ui-monospace,monospace;font-size:9px;border-radius:5px;cursor:pointer;letter-spacing:1px;" onclick="toggleReview(${t.id})">🤖 AI</button></td>
    <td><button class="trade-delete" onclick="deleteTrade(${t.id})">🗑</button></td>
  </tr>
  <tr id="review-row-${t.id}" style="display:none;"><td colspan="11"><div id="review-${t.id}" style="padding:14px;background:rgba(176,107,255,0.04);border-top:1px solid rgba(176,107,255,0.15);border-radius:0 0 8px 8px;font-size:13px;"></div></td></tr>
  `).join('')}</tbody></table>`;
}

function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  loadTrades(); trades = trades.filter(t=>t.id!==id); saveTrades(); renderTradesTable();
}

function clearAllTrades() {
  if (!confirm('Delete ALL trades? This cannot be undone.')) return;
  trades=[]; saveTrades(); renderTradesTable();
}

function exportCSV() {
  loadTrades();
  if (!trades.length) { alert('No trades to export'); return; }
  const headers = ['Date','Symbol','Market','Direction','Grade','Confidence','Entry','Exit','P&L','R:R','Outcome','Timeframe','Strategy','Emotion','Notes'];
  const rows = trades.map(t=>[t.date,t.symbol,t.market,t.direction,t.grade,t.confidence,t.entry,t.exit,t.pnl,t.rr,t.outcome,t.tf,t.strategy,t.emotion,`"${(t.notes||'').replace(/"/g,"'")}"`]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='tradegrace_journal_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

function renderPnL() {
  loadTrades();
  const s = calcStats();
  const best = trades.length ? Math.max(...trades.map(t=>parseFloat(t.pnl)||0)) : 0;
  const worst = trades.length ? Math.min(...trades.map(t=>parseFloat(t.pnl)||0)) : 0;
  document.getElementById('pnlStatsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">TOTAL P&L</div><div class="stat-value" style="color:${s.totalPnL>=0?'var(--accent2)':'var(--danger)'};">${s.totalPnL>=0?'+':''}$${s.totalPnL.toFixed(2)}</div><div class="stat-sub">${s.total} trades</div></div>
    <div class="stat-card"><div class="stat-label">BEST TRADE</div><div class="stat-value" style="color:var(--accent2);">+$${best.toFixed(2)}</div><div class="stat-sub">Single trade max</div></div>
    <div class="stat-card"><div class="stat-label">WORST TRADE</div><div class="stat-value" style="color:var(--danger);">$${worst.toFixed(2)}</div><div class="stat-sub">Single trade min</div></div>
    <div class="stat-card"><div class="stat-label">AVG TRADE</div><div class="stat-value" style="color:${s.totalPnL/Math.max(s.total,1)>=0?'var(--accent2)':'var(--danger)'};">$${(s.totalPnL/Math.max(s.total,1)).toFixed(2)}</div><div class="stat-sub">Per trade average</div></div>`;
  const monthly = {};
  trades.forEach(t => { if (!t.date) return; const k=t.date.slice(0,7); if(!monthly[k]) monthly[k]={pnl:0,count:0}; monthly[k].pnl+=parseFloat(t.pnl)||0; monthly[k].count++; });
  document.getElementById('monthlyGrid').innerHTML = Object.entries(monthly).sort((a,b)=>b[0]>a[0]?1:-1).map(([k,v])=>`<div class="pnl-month-card"><div class="pnl-month-label">${k}</div><div class="pnl-month-val" style="color:${v.pnl>=0?'var(--accent2)':'var(--danger)'};">${v.pnl>=0?'+':''}$${v.pnl.toFixed(2)}</div><div class="pnl-month-trades">${v.count} trade${v.count!==1?'s':''}</div></div>`).join('') || '<div style="color:var(--muted);font-size:12px;">No trades yet</div>';
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], dowPnL=[0,0,0,0,0,0,0];
  trades.forEach(t=>{ if(!t.date) return; const d=new Date(t.date+'T12:00:00').getDay(); dowPnL[d]+=parseFloat(t.pnl)||0; });
  const ctx=document.getElementById('dowChart').getContext('2d');
  if (dowChartInst) dowChartInst.destroy();
  dowChartInst = new Chart(ctx,{type:'bar',data:{labels:days,datasets:[{data:dowPnL,backgroundColor:dowPnL.map(v=>v>=0?'#00ff8844':'#ff475744'),borderColor:dowPnL.map(v=>v>=0?'#00ff88':'#ff4757'),borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:10}},grid:{color:'#1e2d3d'}},y:{ticks:{color:'#4a6070',font:{family:'Space Mono',size:9},callback:v=>'$'+v},grid:{color:'#1e2d3d'}}}}});
}

function toggleReview(id) {
  const row = document.getElementById('review-row-'+id);
  const area = document.getElementById('review-'+id);
  if (row.style.display==='none') { row.style.display='table-row'; if (!area.innerHTML.trim()) reviewTrade(id); }
  else row.style.display='none';
}

function showLesson(id) {
  document.querySelectorAll('.academy-lesson').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.academy-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lesson-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ── Position Calculator ──
function calcPosition() {
  const account = parseFloat(document.getElementById('calc-account').value);
  const riskPct = parseFloat(document.getElementById('calc-risk').value);
  const entry = parseFloat(document.getElementById('calc-entry').value);
  const stop = parseFloat(document.getElementById('calc-stop').value);
  const res = document.getElementById('calc-result');
  if (!account || !riskPct || !entry || !stop) { res.style.display = 'none'; return; }
  const maxRisk = (account * riskPct / 100).toFixed(2);
  const stopDist = Math.abs(entry - stop).toFixed(4);
  const posSize = (maxRisk / Math.abs(entry - stop)).toFixed(2);
  document.getElementById('calc-maxrisk').textContent = '$' + maxRisk;
  document.getElementById('calc-stopdist').textContent = stopDist;
  document.getElementById('calc-possize').textContent = posSize + ' units';
  res.style.display = 'block';
}

// ── Tutorial Modal ──
const TOTAL_SLIDES = 5;
let currentSlide = 0;

function buildDots() {
  const dotsEl = document.getElementById('tutDots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < TOTAL_SLIDES; i++) {
    const d = document.createElement('div');
    d.className = 'modal-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goToSlide(i);
    dotsEl.appendChild(d);
  }
}

function goToSlide(n) {
  document.getElementById('tslide-' + currentSlide).classList.remove('active');
  document.querySelectorAll('.modal-dot')[currentSlide].classList.remove('active');
  currentSlide = n;
  document.getElementById('tslide-' + currentSlide).classList.add('active');
  document.querySelectorAll('.modal-dot')[currentSlide].classList.add('active');
  document.getElementById('tutNextBtn').textContent = currentSlide === TOTAL_SLIDES - 1 ? 'GET STARTED ✓' : 'NEXT →';
}

function nextSlide() {
  if (currentSlide === TOTAL_SLIDES - 1) { closeTutorial(); return; }
  goToSlide(currentSlide + 1);
}

function closeTutorial() {
  document.getElementById('tutorialModal').style.display = 'none';
  try { localStorage.setItem('tg_tutorial_seen', '1'); } catch(e) {}
}

// Init tutorial
buildDots();
try {
  if (!localStorage.getItem('tg_tutorial_seen')) {
    document.getElementById('tutorialModal').style.display = 'flex';
  } else {
    document.getElementById('tutorialModal').style.display = 'none';
  }
} catch(e) {
  document.getElementById('tutorialModal').style.display = 'flex';
}
}); // end DOMContentLoaded
</script>
